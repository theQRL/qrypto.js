name: Lint GitHub Actions

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      # The gate's own exception list: a new suppression must re-run the gate
      # that evaluates it, or it can merge unexamined.
      - '.github/zizmor.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/zizmor.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Lint workflow files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2
        with:
          # The action defaults to `version: latest`, which lets the gate's
          # behavior change overnight with no repo diff. Pin the engine like
          # any other verification input; bump deliberately.
          version: 1.7.10

  zizmor:
    name: zizmor (Actions security analysis)
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
      security-events: write # upload SARIF to GitHub Advanced Security
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        # Pedantic persona: zizmor reports everything it knows about,
        # including stylistic findings like missing job concurrency
        # limits, undocumented permissions, and template-injection
        # candidates. We hold the entire workflow surface to that bar —
        # any new finding at any severity fails the build. Configuration
        # exceptions live in .github/zizmor.yml (currently only the SLSA
        # reusable workflow ref-pin).
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          persona: pedantic
          config: .github/zizmor.yml
