name: CI

# Standalone test matrix — runs lint, tests (Node 20.x/22.x/24.x), dist-check,
# browser tests, and fuzz on every push and pull_request to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Use Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
      - run: npm ci
      - run: npm run lint
      - name: Shared-file sync (dilithium5 ↔ mldsa87)
        run: npm run check-shared
      - name: Typings compile gate (consumer-compile against shipped dist .d.ts)
        run: npm run typecheck

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test

  dist-check:
    name: Verify dist/ is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Use Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
      - run: npm ci
      - run: npm run build
      - name: Check for uncommitted dist changes
        run: |
          if [ -n "$(git diff --name-only packages/*/dist/)" ]; then
            echo "::error::dist/ files are out of date. Run 'npm run build' and commit the result."
            git diff --stat packages/*/dist/
            exit 1
          fi

  fuzz:
    name: Fuzz (quick)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Use Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
      - run: npm ci
      - run: npm run build
      - name: Fuzz verdict-pipeline meta-test
        # Proves the exit-code wiring no clean campaign exercises: injects a
        # THREW / forgery / junk-return / SIGKILL fault and asserts the
        # campaign exit code and summary verdict. Guards against the verdict
        # plumbing silently going fail-open.
        run: node scripts/fuzz/test/fault-injection.test.mjs
      - name: Run quick fuzz campaign
        env:
          # Seed from run_id so every push explores a fresh mutation stream
          # instead of replaying one fixed campaign forever. Reproducibility
          # is preserved: the seed is recorded in summary.json and every
          # harness log header.
          MASTER_SEED: ${{ github.run_id }}
        run: node scripts/fuzz/run-campaign.mjs --profile quick --seed "$MASTER_SEED"

  browser-tests:
    name: Browser Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Use Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
      - run: npm ci
      - name: Install Playwright browsers and deps
        run: npx playwright install --with-deps chromium
      - run: npm run test:browser
