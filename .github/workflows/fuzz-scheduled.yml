name: Scheduled Fuzz

# The per-push CI fuzz job runs the 10k-iteration quick profile only.
# This workflow runs the 100k-iteration weekly profile every Sunday.
# The 1M-iteration deep profile is deliberately NOT scheduled — it is
# reserved for audit-level code review and can be launched on demand via
# workflow_dispatch (or locally: scripts/fuzz/run-campaign.mjs --profile deep).
on:
  schedule:
    - cron: '41 4 * * 0' # weekly profile, Sundays 04:41 UTC
  workflow_dispatch:
    inputs:
      profile:
        description: 'Fuzz profile (quick | weekly | deep)'
        required: false
        default: 'weekly'
        type: choice
        options:
          - quick
          - weekly
          - deep

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fuzz:
    name: Fuzz campaign
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
      issues: write # open/update the pinned failure issue on scheduled-run failure
    # Deep (manual) is 1M iterations across all harnesses; leave generous
    # headroom under the 360-minute job ceiling so artifacts still upload.
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Use Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'

      - run: npm ci
      - run: npm run build

      - name: Select profile
        id: select
        env:
          EVENT_NAME: ${{ github.event_name }}
          PROFILE_INPUT: ${{ inputs.profile }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            profile="${PROFILE_INPUT:-weekly}"
          else
            profile="weekly"
          fi
          echo "profile=${profile}" >> "$GITHUB_OUTPUT"
          echo "Selected profile: ${profile}"

      - name: Run fuzz campaign
        env:
          PROFILE: ${{ steps.select.outputs.profile }}
          # run_id makes the campaign reproducible: the engine derives all
          # mutations deterministically from the master seed.
          MASTER_SEED: ${{ github.run_id }}
        run: node scripts/fuzz/run-campaign.mjs --profile "$PROFILE" --seed "$MASTER_SEED"

      - name: Upload campaign results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-results-${{ github.run_id }}
          path: fuzz-results/
          retention-days: 30
          if-no-files-found: warn

      # Scheduled-run failures only email the last workflow committer and the
      # artifact evidence expires in 30 days — a Sunday-morning crash could
      # otherwise sit unread until it is unrecoverable. Surface it as an issue.
      - name: Open or update failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PROFILE: ${{ steps.select.outputs.profile }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          title="Scheduled fuzz campaign failed"
          body="A \`${PROFILE}\` fuzz campaign failed (trigger: \`${EVENT_NAME}\`).

          Run: ${RUN_URL}
          Campaign artifacts (30-day retention): see the run's \`fuzz-results-*\` artifact — \`summary.json\` records the master seed, per-harness exit codes, and verdicts; any finding is replayable from the recorded seed.

          Exit-code contract: 0 clean / 1 interesting / >=2 critical (see CONTRIBUTING.md \"Fuzzing\")."
          existing="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "\"$title\" in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body"
          fi
