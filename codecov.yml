ignore:
  - "**/dist/**"
  - "**/test/**"
  - "**/browser-tests/**"
  - "**/*.d.ts"

# Targets are 100% on purpose: everything is tested. Branches that are
# unreachable (or practically unreachable) are excluded at the source with
# `/* c8 ignore */` markers, each carrying an adjacent rationale comment —
# see CONTRIBUTING.md "Coverage policy". The exclusions flow into the lcov
# uploads, so codecov measures the same 100% the local c8 run does.
coverage:
  status:
    project:
      dilithium5:
        target: 100%
        threshold: 0%
        flags:
          - dilithium5
      mldsa87:
        target: 100%
        threshold: 0%
        flags:
          - mldsa87
    patch:
      default:
        target: 100%

flags:
  dilithium5:
    paths:
      - packages/dilithium5/src
    carryforward: true
  mldsa87:
    paths:
      - packages/mldsa87/src
    carryforward: true
